<div class="signup-container">
  <h2>Registrati a WikiBlank</h2>

  <form [formGroup]="signupForm" (ngSubmit)="handleSignup()">
    
    <div class="form-group">
      <label for="usr">Scegli uno Username</label>
      <input id="usr" type="text" formControlName="usr" placeholder="Es. nuovo_giocatore">
    </div>

    <div class="form-group">
      <label for="pwd">Crea una Password</label>
      <input id="pwd" type="password" formControlName="pwd" placeholder="Tra 4 e 16 caratteri">
    </div>

    <button type="submit" [disabled]="signupForm.invalid">Crea Account</button>
  </form>

  <p style="margin-top: 15px; text-align: center;">
    Hai già un account? <a routerLink="/login">Accedi qui</a>
  </p>
</div>
